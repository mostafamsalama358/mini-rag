server {

    listen 80;

    server_name localhost;

    # Match FILE_MAX_SIZE (10 MB) in .env.app; extra room for multipart overhead.
    client_max_body_size 20m;



    # Re-resolve Docker service names when upstream containers restart.

    resolver 127.0.0.11 valid=10s ipv6=off;



    location / {

        set $fastapi_upstream http://fastapi:8000;

        proxy_pass $fastapi_upstream;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

    }



    # Optionally expose metrics endpoint directly

    location /TrhBVe_m5gg2522_esvVqS {

        set $fastapi_metrics_upstream http://fastapi:8000/TrhBVe_m5gg2522_esvVqS;

        proxy_pass $fastapi_metrics_upstream;

    }

}

