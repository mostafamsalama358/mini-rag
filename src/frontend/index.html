<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoRAG - Chat Interface</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo-area">
        <div class="logo-icon">▲</div>
        <span>AlgoRAG</span>
      </div>
      
      <div class="input-group">
        <label>User ID</label>
        <input type="text" id="userIdInput" class="input-field" value="demo-user">
      </div>
      
      <div class="input-group">
        <label>Active Project</label>
        <select id="projectSelector" class="project-selector">
          <option value="">Loading...</option>
        </select>
      </div>

      <nav>
        <ul class="nav-links">
          <li>
            <a href="/admin" class="nav-item">
              <span class="material-symbols-outlined">dashboard</span>
              Admin Dashboard
            </a>
          </li>
          <li>
            <a href="/" class="nav-item active">
              <span class="material-symbols-outlined">forum</span>
              Chat Interface
            </a>
          </li>
        </ul>
      </nav>

      <div class="project-status-banner" id="projectStatusBanner" style="margin-top: auto; padding: 1rem; border-radius: var(--radius-sm); background: var(--bg-surface); border: 1px solid var(--border-color); display: none;">
        <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem;">
          <span class="material-symbols-outlined" id="statusIcon" style="font-size: 1.2rem; color: var(--accent);">check_circle</span>
          <span style="font-size: 0.9rem; font-weight: 500;" id="statusTitle">Ready</span>
        </div>
        <div style="font-size: 0.8rem; color: var(--text-muted);" id="statusDetail">Project is ready for questions.</div>
      </div>
    </aside>

    <!-- Main Content (Chat) -->
    <main class="main-content" style="padding: 0;">
      <div class="chat-container">
        
        <!-- Chat Header -->
        <header style="padding: 1.5rem 2rem; border-bottom: 1px solid var(--border-color); background: rgba(10,12,16,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;">
          <h2 style="font-size: 1.25rem;">Chat <span id="activeProjectName" style="color: var(--primary); font-weight: 500; margin-left: 0.5rem;"></span></h2>
        </header>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatLog" style="padding: 1.5rem 2rem;">
          <div class="message assistant">
            <div class="avatar"><span class="material-symbols-outlined">smart_toy</span></div>
            <div class="message-bubble">
              Hello! Select a project from the sidebar and ask me anything about your documents.
            </div>
          </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input-area" style="padding: 1.5rem 2rem; background: var(--bg-base);">
          <form id="chatForm" class="chat-input-wrapper">
            <textarea id="questionInput" class="chat-input" placeholder="Ask me anything about this project..." rows="1" required></textarea>
            <button type="submit" class="send-btn" id="sendBtn">
              <span class="material-symbols-outlined">send</span>
            </button>
          </form>
        </div>

      </div>
    </main>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
